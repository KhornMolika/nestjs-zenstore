# version: '3.8'
services:
  db:
    image: postgres:15
    container_name: zenstore-db
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: moly
      POSTGRES_PASSWORD: moly123!@#
      POSTGRES_DB: zenstore
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: